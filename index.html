const W=640,H=400,TILE=16,COLS=40,ROWS=25;
const cv=document.getElementById('gc');
const ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

class Sheet{
  constructor(src,fw,fh){
    this.fw=fw;this.fh=fh;this.ok=false;
    this.img=new Image();
    this.img.crossOrigin='anonymous';
    this.img.onload=()=>{
      this.ok=true;
      this.cols=Math.floor(this.img.width/this.fw);
      this.rows=Math.floor(this.img.height/this.fh);
      console.log('[v0] Sheet loaded:',this.img.width,'x',this.img.height,'frames:',this.cols,'x',this.rows);
    };
    this.img.onerror=()=>{console.log('[v0] Sheet failed to load');};
    this.img.src=src;
  }
  blit(col,row,dx,dy,flipX=false){
    if(!this.ok)return;
    // Clamp to actual sprite sheet bounds
    col=Math.max(0,Math.min(col,this.cols-1));
    row=Math.max(0,Math.min(row,this.rows-1));
    ctx.save();
    if(flipX){ctx.translate(Math.round(dx)+this.fw,Math.round(dy));ctx.scale(-1,1);dx=0;dy=0;}
    else{dx=Math.round(dx);dy=Math.round(dy);}
    ctx.drawImage(this.img,col*this.fw,row*this.fh,this.fw,this.fh,dx,dy,this.fw,this.fh);
    ctx.restore();
  }
}

const charSh=new Sheet(CHAR_SRC,20,29);
const logSh =new Sheet(LOG_SRC,32,32);
const owSh  =new Sheet(OW_SRC,16,16);

// Map tile types: 0=grass 1=wall 2=water
const map=[];
for(let r=0;r<ROWS;r++){map[r]=[];for(let c=0;c<COLS;c++){
  if(r===0||r===ROWS-1||c===0||c===COLS-1)map[r][c]=1;
  else if(r>4&&r<8&&c>8&&c<14)map[r][c]=1;
  else if(r>14&&r<18&&c>24&&c<30)map[r][c]=1;
  else if(r>9&&r<12&&c>18&&c<22)map[r][c]=2;
  else map[r][c]=0;
}}
// stable grass variant noise
const gv=[];
for(let r=0;r<ROWS;r++){gv[r]=[];for(let c=0;c<COLS;c++)gv[r][c]=(r*37+c*13)%2;}

function solid(px,py,w,h){
  for(let r=Math.floor((py+2)/TILE);r<=Math.floor((py+h-3)/TILE);r++)
    for(let c=Math.floor((px+2)/TILE);c<=Math.floor((px+w-3)/TILE);c++)
      if(r<0||r>=ROWS||c<0||c>=COLS||map[r][c]===1)return true;
  return false;
}
function overlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

const keys={};
const parts=[];
function burst(x,y,col,n=8){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=40+Math.random()*90;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-55,c:col,l:0.3+Math.random()*0.25,m:0.55});}
}

// ── Player ─────────────────────────────────────────────
// character.png: 17x20, rows:
//   0=down-walk(4f)  1=left-walk(4f)  2=right-walk(4f)  3=up-walk(4f)
//   5=sword-left(3f) 6=sword-right(3f) 7=sword-down(3f)
class Player{
  constructor(x,y){
    this.x=x;this.y=y;this.w=12;this.h=14;
    this.spd=90;this.dir=2;this.hp=3;this.maxHp=3;
    this.state='idle';
    this.at=0;this.ad=0.3;this.ac=0;
    this.if_=0;this.dt=0;this.dc=0;
    this.ft=0;this.f=0;
    this.fx=0;this.fy=1;this.hb=null;
  }
  get cx(){return this.x+this.w/2;}
  get cy(){return this.y+this.h/2;}
  dn(){return['up','right','down','left'][this.dir];}

  doAtk(){
    if(this.ac>0)return;
    this.state='attack';this.at=this.ad;this.ac=0.5;this.f=0;this.ft=0;
    this.hb={x:this.cx+this.fx*16-6,y:this.cy+this.fy*16-6,w:12,h:12};
  }
  doDash(){if(this.dc>0)return;this.dt=0.15;this.dc=0.8;this.if_=0.3;}

  update(dt,enms){
    this.ac=Math.max(0,this.ac-dt);
    this.if_=Math.max(0,this.if_-dt);
    this.dc=Math.max(0,this.dc-dt);
    if((keys.Space||keys.KeyJ)&&this.state!=='attack')this.doAtk();
    if(keys.KeyK&&this.dt<=0)this.doDash();

    if(this.at>0){
      this.at-=dt;this.ft+=dt;
      if(this.ft>0.1){this.ft=0;this.f=Math.min(this.f+1,2);}
      if(this.at<=0){this.state='idle';this.hb=null;}
    }

    let dx=0,dy=0;
    if(keys.KeyW||keys.ArrowUp)   dy=-1;
    if(keys.KeyS||keys.ArrowDown) dy=1;
    if(keys.KeyA||keys.ArrowLeft) dx=-1;
    if(keys.KeyD||keys.ArrowRight)dx=1;

    if(dx||dy){
      const l=Math.sqrt(dx*dx+dy*dy);
      this.fx=dx/l;this.fy=dy/l;
      if(Math.abs(dx)>Math.abs(dy))this.dir=dx>0?1:3;
      else this.dir=dy>0?2:0;
      if(this.state!=='attack'){
        this.state='walk';this.ft+=dt;
        if(this.ft>0.14){this.ft=0;this.f=(this.f+1)%4;}
      }
    }else if(this.state!=='attack'){this.state='idle';this.f=0;}

    const sp=this.dt>0?260:this.spd;
    this.dt=Math.max(0,this.dt-dt);
    if(!solid(this.x+dx*sp*dt,this.y,this.w,this.h))this.x+=dx*sp*dt;
    if(!solid(this.x,this.y+dy*sp*dt,this.w,this.h))this.y+=dy*sp*dt;
    if(this.hb){this.hb.x=this.cx+this.fx*16-6;this.hb.y=this.cy+this.fy*16-6;}

    if(this.if_<=0){
      for(const e of enms){
        if(e.hp>0&&overlap(this.x,this.y,this.w,this.h,e.x,e.y,e.w,e.h)){
          this.hp--;this.if_=0.9;
          burst(this.cx,this.cy,'#e8c060',6);
          // knock away
          const dx2=this.cx-e.cx,dy2=this.cy-e.cy,l=Math.sqrt(dx2*dx2+dy2*dy2)||1;
          this.x+=dx2/l*14;this.y+=dy2/l*14;
          break;
        }
      }
    }
  }

  draw(){
    if(this.if_>0&&Math.floor(this.if_*10)%2===0)return;
    // Center sprite on collision box
    const ox=Math.round(this.x+this.w/2-charSh.fw/2);
    const oy=Math.round(this.y+this.h-charSh.fh);
    const dn=this.dn();
    if(!charSh.ok){ctx.fillStyle='#e8a84a';ctx.fillRect(this.x,this.y,this.w,this.h);return;}
    // Use available rows in sprite sheet, with bounds checking
    const maxRow=charSh.rows-1;
    if(this.state==='attack'){
      // Attack animation - use row 0 with frame offset for attack
      const atkRow=Math.min({down:0,left:0,right:0,up:0}[dn]||0,maxRow);
      const flipX=(dn==='left');
      charSh.blit(this.f%charSh.cols, atkRow, ox, oy, flipX);
    }else{
      // Walk animation - cycle through frames on row 0
      const walkRow=Math.min(0,maxRow);
      const flipX=(dn==='left');
      charSh.blit(this.f%charSh.cols, walkRow, ox, oy, flipX);
    }
  }
}

// ── Enemy ──────────────────────────────────────────────
// log.png: 32x32, 6 cols x 4 rows
// rows: 0=down, 1=left, 2=right, 3=up  (6 walk frames each)
class Enemy{
  constructor(x,y,type=0){
    this.x=x;this.y=y;this.w=14;this.h=16;
    this.type=type;
    this.hp=type===1?3:2;this.maxHp=this.hp;
    this.spd=type===1?52:36;
    this.dir=2;this.state='idle';
    this.ft=0;this.f=0;this.kbt=0;this.kb={x:0,y:0};
    this.ar=type===1?115:90;
  }
  get cx(){return this.x+this.w/2;}
  get cy(){return this.y+this.h/2;}

  hit(dx,dy){
    this.hp--;
    this.kb={x:dx*140,y:dy*140};this.kbt=0.22;
    burst(this.cx,this.cy,this.type===1?'#805010':'#903010',8);
  }

  update(dt,p){
    if(this.kbt>0){
      this.kbt-=dt;
      if(!solid(this.x+this.kb.x*dt,this.y,this.w,this.h))this.x+=this.kb.x*dt;
      if(!solid(this.x,this.y+this.kb.y*dt,this.w,this.h))this.y+=this.kb.y*dt;
      return;
    }
    const ddx=p.cx-this.cx,ddy=p.cy-this.cy,dist=Math.sqrt(ddx*ddx+ddy*ddy);
    if(dist<this.ar&&dist>1){
      this.state='walk';
      const nx=ddx/dist,ny=ddy/dist;
      if(Math.abs(ddx)>Math.abs(ddy))this.dir=ddx>0?1:3;else this.dir=ddy>0?2:0;
      if(!solid(this.x+nx*this.spd*dt,this.y,this.w,this.h))this.x+=nx*this.spd*dt;
      if(!solid(this.x,this.y+ny*this.spd*dt,this.w,this.h))this.y+=ny*this.spd*dt;
      this.ft+=dt;if(this.ft>0.18){this.ft=0;this.f=(this.f+1)%6;}
    }else{this.state='idle';this.f=0;}
  }

  draw(){
    // Center sprite on collision box
    const ox=Math.round(this.x+this.w/2-logSh.fw/2);
    const oy=Math.round(this.y+this.h-logSh.fh);
    if(!logSh.ok){ctx.fillStyle='#a03020';ctx.fillRect(this.x,this.y,this.w,this.h);return;}
    // Use available rows with bounds checking
    const maxRow=logSh.rows-1;
    const maxCol=logSh.cols-1;
    const rowMap={2:0,3:Math.min(1,maxRow),1:Math.min(2,maxRow),0:Math.min(3,maxRow)};
    const flipX=(this.dir===3); // flip for left direction
    logSh.blit(Math.min(this.f%6,maxCol), Math.min(rowMap[this.dir]||0,maxRow), ox, oy, flipX);
    // hp bar (positioned above sprite)
    const hpY=oy-4;
    ctx.fillStyle='#400';ctx.fillRect(this.x,hpY,this.w,3);
    ctx.fillStyle=this.type===1?'#d08010':'#e03030';
    ctx.fillRect(this.x,hpY,this.w*(this.hp/this.maxHp),3);
    if(this.state==='walk'){
      ctx.fillStyle='#ffee44';ctx.font='bold 8px monospace';
      ctx.fillText('!',this.x+5,hpY-4);
    }
  }
}

// ── Map Rendering ──────────────────────────────────────
// owSh tileset layout (16x16 each, 4 cols x 2 rows):
// (0,0)=grass_dark (1,0)=grass_light (2,0)=water_a (3,0)=water_b
// (0,1)=wall_face  (1,1)=wall_base   (2,1)=dirt    (3,1)=alt_grass
function drawMap(){
  const t=Date.now()/1000;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const x=c*TILE,y=r*TILE,tp=map[r][c];
    if(!owSh.ok){
      ctx.fillStyle=tp===1?'#4a3728':tp===2?'#1a4a6e':(c+r)%2===0?'#2d5a27':'#254d20';
      ctx.fillRect(x,y,TILE,TILE);continue;
    }
    if(tp===0){
      owSh.blit(gv[r][c],0,x,y);
    }else if(tp===1){
      owSh.blit(0,1,x,y);  // wall face
    }else if(tp===2){
      const wf=Math.floor(t*1.5)%2;
      owSh.blit(2+wf,0,x,y);  // animated water
    }
  }
}

// ── Game ───────────────────────────────────────────────
let player,enemies,running=false;
function init(){
  player=new Player(5*TILE,5*TILE);
  enemies=[
    new Enemy(10*TILE,5*TILE,0), new Enemy(20*TILE,10*TILE,1),
    new Enemy(30*TILE,5*TILE,0), new Enemy(12*TILE,18*TILE,1),
    new Enemy(35*TILE,18*TILE,0),new Enemy(25*TILE,15*TILE,0),
    new Enemy(8*TILE,12*TILE,1)
  ];
  parts.length=0;
}

let lt=0,fps=60,fpt=0,fpc=0;
function loop(ts){
  if(!running)return;
  const dt=Math.min((ts-lt)/1000,0.05);lt=ts;
  fpc++;fpt+=dt;if(fpt>=0.5){fps=Math.round(fpc/fpt);fpc=0;fpt=0;}

  const alive=enemies.filter(e=>e.hp>0);
  player.update(dt,alive);
  for(const e of alive)e.update(dt,player);

  if(player.hb){
    for(const e of alive){
      if(e.hp>0&&overlap(player.hb.x,player.hb.y,player.hb.w,player.hb.h,e.x,e.y,e.w,e.h)){
        const dx=e.cx-player.cx,dy=e.cy-player.cy,l=Math.sqrt(dx*dx+dy*dy)||1;
        e.hit(dx/l,dy/l);player.hb=null;break;
      }
    }
  }
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=140*dt;p.l-=dt;
    if(p.l<=0)parts.splice(i,1);
  }

  ctx.clearRect(0,0,W,H);
  drawMap();

  const ents=[player,...alive].sort((a,b)=>a.cy-b.cy);
  for(const e of ents){
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();
    ctx.ellipse(e.cx,e.y+e.h+1,6,3,0,0,Math.PI*2);ctx.fill();
  }
  for(const e of ents)e.draw();
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,p.l/p.m);ctx.fillStyle=p.c;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;

  // HUD hearts
  let hud='';for(let i=0;i<player.maxHp;i++)hud+=i<player.hp?'♥':'♡';
  document.getElementById('hd').textContent=hud;
  document.getElementById('fd').textContent='FPS:'+fps;
  document.getElementById('ed').textContent='Gegner:'+alive.length;
  document.getElementById('sd').textContent=player.state+' '+player.dn();

  if(player.hp<=0){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e04040';ctx.font='bold 28px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-10);
    ctx.fillStyle='#aaa';ctx.font='13px monospace';ctx.fillText('R — Neustart',W/2,H/2+18);
    ctx.textAlign='left';running=false;return;
  }
  if(alive.length===0){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#aaee66';ctx.font='bold 26px monospace';ctx.textAlign='center';
    ctx.fillText('ALLE BESIEGT! ⚔',W/2,H/2-10);
    ctx.fillStyle='#aaa';ctx.font='13px monospace';ctx.fillText('R — Neustart',W/2,H/2+18);
    ctx.textAlign='left';running=false;return;
  }
  requestAnimationFrame(loop);
}

function start(){
  document.getElementById('ov').style.display='none';
  init();running=true;lt=performance.now();requestAnimationFrame(loop);
}
document.getElementById('sb').addEventListener('click',start);
document.addEventListener('keydown',e=>{
  keys[e.code]=true;keys[e.key]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if((e.key==='r'||e.key==='R')&&!running)start();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;keys[e.key]=false;});
